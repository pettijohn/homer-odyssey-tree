<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Odyssey — Hierarchical Summary</title>
  <style>
    :root { color-scheme: light dark; font-family: Georgia, serif; line-height: 1.55; }
    body { max-width: 70rem; margin: 2rem auto; padding: 0 1rem 4rem; }
    h1 { margin-bottom: .25rem; }
    .intro { margin-top: 0; color: #777; }
    .book { border-top: 1px solid #9996; padding: .8rem 0; }
    .section-summary, .paragraph-summary { cursor: pointer; }
    .book-summary { font-size: 1.05rem; margin: .25rem 0; }
    .book-title { margin: .25rem 0; }
    .section-summary::before, .paragraph-summary::before { content: "▸"; display: inline-block; width: 1.2rem; }
    .section-summary, .paragraph-summary { margin: .25rem 0; }
    [aria-expanded="true"]::before { content: "▾"; }
    .book-section { margin: .7rem 0 0 1.2rem; padding-left: 1rem; border-left: 2px solid #9996; }
    .paragraph { margin: .55rem 0; }
    .source { margin: .45rem 0 .8rem 1.2rem; padding: .65rem .85rem; background: #8881; white-space: pre-wrap; }
    .footnote { font-size: .75em; line-height: 0; vertical-align: super; }
    [hidden] { display: none !important; }
    [role="button"]:focus-visible { outline: 2px solid currentColor; outline-offset: 3px; }
  </style>
</head>
<body>
  <h1>The Odyssey</h1>
  <p class="intro">Select a sentence in a book summary to reveal its paragraph summaries. Select a paragraph summary to reveal the source.</p>
  <main id="tree" role="tree" aria-label="The Odyssey hierarchical summary"></main>
  <script>
    // Hard-coded edition configuration. Change this key when rebuilding for another edition.
    const SOURCE_EDITIONS = Object.freeze({
      pg1727: "https://www.gutenberg.org/cache/epub/1727/pg1727-images.html",
      pg1728: "https://www.gutenberg.org/cache/epub/1728/pg1728-images.html"
    });
    const SOURCE_EDITION = "pg1728";
    const ODYSSEY_DATA = __ODYSSEY_DATA__;

    if (ODYSSEY_DATA.source_edition !== SOURCE_EDITION) {
      throw new Error(`Embedded data is for ${ODYSSEY_DATA.source_edition}, not ${SOURCE_EDITION}`);
    }

    function toggle(control) {
      const target = document.getElementById(control.getAttribute("aria-controls"));
      const expanded = control.getAttribute("aria-expanded") === "true";
      control.setAttribute("aria-expanded", String(!expanded));
      target.hidden = expanded;
    }

    function expandable(text, targetId, className, tagName = "p") {
      const control = document.createElement(tagName);
      control.className = className;
      control.setAttribute("role", "button");
      control.setAttribute("tabindex", "0");
      control.setAttribute("aria-expanded", "false");
      control.setAttribute("aria-controls", targetId);
      control.textContent = text;
      control.addEventListener("click", () => toggle(control));
      control.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          toggle(control);
        }
      });
      return control;
    }

    function appendSourceWithFootnotes(element, text) {
      const footnotePattern = /\[(\d+)\]/g;
      let cursor = 0;
      for (const match of text.matchAll(footnotePattern)) {
        element.append(document.createTextNode(text.slice(cursor, match.index)));
        const footnote = document.createElement("sup");
        footnote.className = "footnote";
        const link = document.createElement("a");
        link.href = `${SOURCE_EDITIONS[SOURCE_EDITION]}#linknote-${match[1]}`;
        link.textContent = match[0];
        link.setAttribute("aria-label", `Footnote ${match[1]} on Project Gutenberg`);
        footnote.append(link);
        element.append(footnote);
        cursor = match.index + match[0].length;
      }
      element.append(document.createTextNode(text.slice(cursor)));
    }

    const tree = document.getElementById("tree");
    for (const book of ODYSSEY_DATA.books) {
      const bookNode = document.createElement("section");
      bookNode.className = "book";
      bookNode.setAttribute("role", "treeitem");
      const bookSummary = document.createElement("div");
      bookSummary.className = "book-summary";
      bookSummary.setAttribute("role", "group");
      const bookTitleLine = document.createElement("p");
      bookTitleLine.className = "book-title";
      const bookTitle = document.createElement("strong");
      bookTitle.textContent = `${book.title}.`;
      bookTitleLine.append(bookTitle);
      bookSummary.append(bookTitleLine);

      for (const section of book.sections) {
        const sectionId = `book-${book.number}-section-${section.number}`;
        const sectionNode = document.createElement("div");
        sectionNode.setAttribute("role", "treeitem");
        sectionNode.append(expandable(section.summary, sectionId, "section-summary"));

        const sectionGroup = document.createElement("div");
        sectionGroup.id = sectionId;
        sectionGroup.className = "book-section";
        sectionGroup.setAttribute("role", "group");
        sectionGroup.hidden = true;

        for (const paragraph of section.paragraphs) {
          const paragraphNode = document.createElement("div");
          paragraphNode.className = "paragraph";
          paragraphNode.setAttribute("role", "treeitem");
          const sourceId = `book-${book.number}-source-${paragraph.number}`;
          paragraphNode.append(expandable(paragraph.summary, sourceId, "paragraph-summary"));

          const source = document.createElement("p");
          source.id = sourceId;
          source.className = "source";
          appendSourceWithFootnotes(source, paragraph.source);
          source.hidden = true;
          paragraphNode.append(source);
          sectionGroup.append(paragraphNode);
        }
        sectionNode.append(sectionGroup);
        bookSummary.append(sectionNode);
      }
      bookNode.append(bookSummary);
      tree.append(bookNode);
    }
  </script>
</body>
</html>
